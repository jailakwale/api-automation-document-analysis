name: IDnow API Test Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_marker:
        description: "pytest marker to run (blank = all)"
        required: false
        default: ""

jobs:
  api-tests:
    name: "API Tests — Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pytest pytest-asyncio pytest-xdist allure-pytest \
                      pydantic pydantic-settings tenacity jsonschema \
                      python-dotenv pytest-cov Pillow

      - name: Create reports directory
        run: mkdir -p reports/allure-results

      - name: Run API test suite
        run: |
          MARKER=""
          if [ -n "${{ github.event.inputs.test_marker }}" ]; then
            MARKER="-m ${{ github.event.inputs.test_marker }}"
          fi
          python -m pytest $MARKER \
            --tb=short \
            --alluredir=reports/allure-results \
            --junitxml=reports/junit.xml \
            -v
        env:
          PYTHONPATH: src
          IDNOW_USERNAME:             ${{ secrets.IDNOW_USERNAME }}
          IDNOW_PASSWORD:             ${{ secrets.IDNOW_PASSWORD }}
          IDNOW_OAUTH_CLIENT_ID:      cis-api-client
          IDNOW_REALM:                ariadnext-idcheck-sandbox
          IDNOW_ENV:                  sandbox
          IDNOW_POLL_TIMEOUT_SECONDS: 180
          IDNOW_POLL_INTERVAL_SECONDS: 5
          LOG_LEVEL:                  INFO

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-py${{ matrix.python-version }}
          path: reports/allure-results/
          retention-days: 30

      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-report-py${{ matrix.python-version }}
          path: reports/junit.xml
          retention-days: 30

  # ── Optional: publish Allure HTML report to GitHub Pages ─────────────────────
  publish-report:
    name: "Publish Allure Report"
    needs: api-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure results (py3.11)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-py3.11
          path: allure-results/

      - name: Generate Allure HTML report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Publish report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
